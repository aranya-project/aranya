name: Verify crates.io credentials

on:
  pull_request:

jobs:
  verify-token:
    name: Verify crates.io token
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with crates.io
        run: |
          response=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: $CARGO_REGISTRY_TOKEN" \
            -H "User-Agent: aranya-ci (aranya-project/aranya)" \
            https://crates.io/api/v1/me)
          http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_CODE:/d')
          if [ "$http_code" = "200" ]; then
            echo "✅ crates.io token is valid"
          else
            echo "❌ crates.io token returned HTTP $http_code"
            echo "Response: $body"
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.ARANYA_BOT_CRATESIO_CARGO_LOGIN_KEY }}
